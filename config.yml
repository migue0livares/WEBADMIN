# ══════════════════════════════════════════════════════════════
# Configuración de Decap CMS para En Paralelo
# Autenticación vía DecapBridge (decapbridge.com) - gratis.
# ══════════════════════════════════════════════════════════════

backend:
  name: git-gateway
  repo: migueOlivares/WebEnParaleloADMIN
  branch: main
  identity_url: https://auth.decapbridge.com/sites/PENDIENTE   # ← lo reemplazas en el paso de DecapBridge
  gateway_url: https://gateway.decapbridge.com

# Carpeta donde se guardan las imágenes que subas desde el editor
media_folder: "assets/uploads"
public_folder: "assets/uploads"

locale: es

collections:
  - name: "contenido"
    label: "Contenido del sitio"
    files:

      # ── PROYECTOS ──────────────────────────────────────────
      - name: "proyectos"
        label: "Proyectos"
        file: "content.json"
        format: "json"
        fields:
          - label: "Proyectos"
            name: "proyectos"
            widget: "list"
            summary: "{{fields.titulo}} — {{fields.cliente}}"
            fields:
              - { label: "Mostrar en el sitio", name: "visible", widget: "boolean", default: true }
              - { label: "ID (no repetir)", name: "id", widget: "number", value_type: "int" }
              - label: "Categoría"
                name: "categoria"
                widget: "select"
                options: ["Ferias", "Eventos", "Stands", "Rental", "Implementación Gráfica"]
              - { label: "Cliente", name: "cliente", widget: "string" }
              - { label: "Título del proyecto", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Imagen miniatura (tarjeta del grid)", name: "imagen_thumb", widget: "image" }
              - label: "Imágenes del modal (galería al hacer clic)"
                name: "imagenes_modal"
                widget: "list"
                field: { label: "Imagen", name: "imagen", widget: "image" }

      # ── CLIENTES (logos) ───────────────────────────────────
      - name: "clientes"
        label: "Logos de Clientes"
        file: "content.json"
        format: "json"
        fields:
          - label: "Logos de clientes"
            name: "clientes"
            widget: "list"
            summary: "{{fields.nombre}}"
            fields:
              - { label: "Mostrar en el sitio", name: "visible", widget: "boolean", default: true }
              - { label: "Nombre del cliente", name: "nombre", widget: "string" }
              - { label: "Logo", name: "url_logo", widget: "image" }

      # ── PARTNERS (logos) ───────────────────────────────────
      - name: "partners"
        label: "Logos de Partners"
        file: "content.json"
        format: "json"
        fields:
          - label: "Logos de partners"
            name: "partners"
            widget: "list"
            summary: "{{fields.nombre}}"
            fields:
              - { label: "Mostrar en el sitio", name: "visible", widget: "boolean", default: true }
              - { label: "Nombre del partner", name: "nombre", widget: "string" }
              - { label: "Logo", name: "url_logo", widget: "image" }

      # ── TESTIMONIOS ─────────────────────────────────────────
      - name: "testimonios"
        label: "Testimonios"
        file: "content.json"
        format: "json"
        fields:
          - label: "Testimonios"
            name: "testimonios"
            widget: "list"
            summary: "{{fields.nombre}} — {{fields.empresa}}"
            fields:
              - { label: "Mostrar en el sitio", name: "visible", widget: "boolean", default: true }
              - { label: "ID (no repetir)", name: "id", widget: "number", value_type: "int" }
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Cargo", name: "cargo", widget: "string" }
              - { label: "Empresa", name: "empresa", widget: "string" }
              - { label: "Texto del testimonio", name: "texto", widget: "text" }
              - { label: "Foto de la persona", name: "foto_autor", widget: "image" }
